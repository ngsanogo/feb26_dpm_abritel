name: daily-scrape

on:
  schedule:
    - cron: "0 20 * * *"  # Every day at 8pm UTC ≈ 10pm Paris (CET/CEST ±1h)
  workflow_dispatch:  # Exécution manuelle possible

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          python-version-file: .python-version
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run pipeline
        run: uv run python 1_pipeline.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/avis_enrichis.csv
          git diff --cached --quiet || git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          git push
