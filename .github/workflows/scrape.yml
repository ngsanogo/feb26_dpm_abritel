name: daily-scrape

on:
  schedule:
    - cron: "0 20 * * *"  # Every day at 8pm UTC ≈ 10pm Paris (CET/CEST ±1h)
  workflow_dispatch:  # Exécution manuelle possible

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      # Soft breaker : le job reste vert et le CSV est commité même si une source
      # retourne 0 avis (transitoire / fenêtre courte). Annotation ::warning:: dans les logs.
      - name: Run pipeline
        env:
          ABRITEL_SOFT_CIRCUIT_BREAKER: "1"
        run: uv run python 1_pipeline.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/avis_enrichis.csv
          git diff --cached --quiet || git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          git push
