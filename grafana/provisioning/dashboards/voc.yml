apiVersion: 1

# Charge automatiquement tous les *.json sous /var/lib/grafana/dashboards.
providers:
  - name: VoC dashboards
    orgId: 1
    folder: VoC
    folderUid: voc-folder
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
